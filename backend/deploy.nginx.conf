# ════════════════════════════════════════════════════════════════
# Nginx Configuration — Hostinger VPS Deployment
# ════════════════════════════════════════════════════════════════
#
# Installation:
#   1. Replace all 'yourdomain.com' with your actual domain
#   2. Replace /var/www/yourdomain with your app path
#   3. sudo cp this file to /etc/nginx/sites-available/yourdomain.com
#   4. sudo ln -s /etc/nginx/sites-available/yourdomain.com /etc/nginx/sites-enabled/
#   5. sudo nginx -t
#   6. sudo systemctl reload nginx
#   7. sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
# ════════════════════════════════════════════════════════════════

upstream magnus_backend {
    server 127.0.0.1:5000;
    keepalive 32;
}

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # ─── Let's Encrypt ACME challenge ───
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/yourdomain/public_html;
        allow all;
    }

    # ─── Backend API ───
    location /api/ {
        proxy_pass http://magnus_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }

    # ─── Uploads ───
    location /uploads/ {
        proxy_pass http://magnus_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ─── WebSocket (Socket.io) ───
    location /socket.io/ {
        proxy_pass http://magnus_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
    }

    # ─── React Frontend ───
    location / {
        root /var/www/yourdomain/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache busting for hashed assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}

# ─── HTTPS Server (auto-generated by certbot) ───
# Run: sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
# Certbot will insert the SSL config automatically below this line.
